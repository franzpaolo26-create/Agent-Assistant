# ═══════════════════════════════════════════════════════════════
#   OpenClaw OS — Docker Compose Stack
#   Servicios: openclaw-gateway | ollama
# ═══════════════════════════════════════════════════════════════

services:

  # ── OpenClaw (Motor Principal) ──────────────────────────────
  openclaw:
    image: node:22-bullseye-slim
    container_name: openclaw-gateway
    restart: unless-stopped
    # Instala OpenClaw cada vez que arranca para asegurar tener la última versión
    # y luego levanta el Gateway escuchando en todas las interfaces.
    command: >
      sh -c "npm install -g openclaw@latest && openclaw gateway --port 18789 --host 0.0.0.0"
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - NODE_ENV=production
    volumes:
      # Persistencia vital: Aquí se guarda la base de datos de OpenClaw, 
      # configuración, Skills y sesiones de WhatsApp/Telegram
      - ./openclaw_data:/root/.openclaw
    ports:
      - "18789:18789"
    networks:
      - jarvis-net
    depends_on:
      - ollama
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

  # ── Ollama (Cerebro Local) ──────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: jarvis-ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - jarvis-net
    deploy:
      resources:
        limits:
          memory: 5G
          cpus: '3'

networks:
  jarvis-net:
    driver: bridge
    name: openclaw-network

volumes:
  ollama_models:
    name: openclaw-ollama-models
